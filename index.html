<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>VSTOOLS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <div class="ui-sidebar">
      <div class="ui-panel app-file">
        <h2>File</h2>

        <p>
          <label>
            Select SHP, WEP, ZUD, ZND, or ARM<br>
            <input type="file" class="file1">
          </label>
        </p>

        <p>
          <label>
            Select SEQ or MPD<br>
            <input type="file" class="file2">
          </label>
        </p>


        <p>
          <button class="load">Open</button>
        </p>
      </div>

      <div class="ui-panel app-animation">
        <h2>Animation</h2>

        <p>
          <label>
            SEQ Source
            <select class="seq-source">
              <option value="auto">Auto</option>
              <option value="battle">Battle</option>
              <option value="common">Common</option>
            </select>
          </label>
        </p>

        <p>
          <button class="prev">&lt;</button>
          <input class="animation" size="3">
          <button class="next">&gt;</button>
          <span class="animation-count"></span>
        </p>

        <div class="animation-meta"></div>
      </div>

      <div class="ui-panel app-textures">
        <h2>Textures</h2>
        <div class="textures"></div>
      </div>

      <div class="ui-panel app-settings">
        <h2>Settings</h2>

        <p>
          <label>
            <input type="checkbox" class="wireframe"> Wireframe
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" class="no-vertex-colors"> Disable Vertex Colors
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" class="no-texture"> Disable Texture
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" class="normals"> Use Normal Material
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" class="skeleton"> Show Skeleton
          </label>
        </p>

        <p>
          <label>
            <input type="checkbox" class="show-orbit-center" checked> Show Orbit Center
          </label>
        </p>

      </div>

      <div class="ui-panel app-mount">
        <h2>Weapon/Shield Mount</h2>

        <p>
          <label>
            <input type="checkbox" class="attach-equipment" checked> Attach ZUD Weapon/Shield
          </label>
        </p>

        <p class="mount-static">
          Weapon: Mount 2 (Right Hand)<br>
          Shield: Mount 3 (Left Hand)
        </p>

        <p class="mount-select">
          <label>
            Weapon Mount
            <select class="weapon-mount">
              <option value="auto">Auto (Mount 2)</option>
              <option value="none">None</option>
              <option value="1">Mount 1</option>
              <option value="2">Mount 2</option>
              <option value="3">Mount 3</option>
              <option value="4">Mount 4</option>
              <option value="5">Mount 5</option>
              <option value="6">Mount 6</option>
            </select>
          </label>
        </p>

        <p class="mount-select">
          <label>
            Shield Mount
            <select class="shield-mount">
              <option value="auto">Auto (Mount 3)</option>
              <option value="none">None</option>
              <option value="1">Mount 1</option>
              <option value="2">Mount 2</option>
              <option value="3">Mount 3</option>
              <option value="4">Mount 4</option>
              <option value="5">Mount 5</option>
              <option value="6">Mount 6</option>
            </select>
          </label>
        </p>
      </div>

      <div class="ui-panel app-export">
        <h2>Export</h2>
        <!-- <p><button id="exportCollada">Export Collada</button></p> -->
        <p><button class="export-obj">Export OBJ</button></p>
        <p><small>Exports the geometry <em>as is</em>, without skeleton and animations.</small></p>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="dist/Viewer.js"></script>

    <script type="module">
      import { Viewer } from "./dist/Viewer.js";
      const viewer = new Viewer();
      viewer.run();
    </script>
  </body>
</html>
